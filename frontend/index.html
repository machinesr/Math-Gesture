    <!-- MediaPipe Hands WASM/model assets are pulled from jsdelivr at runtime.

         the camera cold-start on mobile networks where handshakes dominate. -->

    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <title>frontend</title>
  </head>

    <script type="module" src="/src/main.tsx"></script>
